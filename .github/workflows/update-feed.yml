name: Update FA feed
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run poller
        env:
          TEAM: "NYR"
          TEAM_NAME: "Rangers"
        run: python3 scripts/update_feed.py
      - name: Commit any changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "fa-watch-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add feed.json roster-state.json
            git commit -m "Auto-update feed"
            git push
          else
            echo "No changes to commit."
          fi
