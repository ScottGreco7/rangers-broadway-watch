name: Update FA feed
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run poller
        env:
          TEAM: "NYR"
          TEAM_NAME: "Rangers"
          NEWS_QUERY: '"New York Rangers" (trade OR signing OR signs OR "agrees to terms" OR rumor OR interest OR acquire OR waivers) -recap -highlights -preview -"game thread"'
          NEWS_SITES: ""
          NEWS_SITE_TERMS: "Rangers OR Blueshirts"
          RUMOR_SITES: "dailyfaceoff.com,thefourthperiod.com,nhltraderumors.me,prohockeyrumors.com"
          RUMOR_INSIDERS: "Elliotte Friedman,Darren Dreger,Pierre LeBrun,David Pagnotta,Frank Seravalli,Chris Johnston,Bob McKenzie,Kevin Weekes"
          NTFY_TOPIC: ""   # optional: put a unique topic name here (e.g. rangers-scott-9f3k2) and subscribe to it in the ntfy app for phone alerts
        run: python3 scripts/update_feed.py
      - name: Commit any changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "fa-watch-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add feed.json roster-state.json
            git commit -m "Auto-update feed"
            git push
          else
            echo "No changes to commit."
          fi
